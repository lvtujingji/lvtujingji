apiVersion: v1
kind: Pod
metadata:
  name: kaniko
spec:
  containers:
  - name: kaniko
    image: gcr.io/kaniko-project/executor:latest
    args: ["--dockerfile=dockerfile",
      "--context=git://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@github.com/lvtujingji/lvtujingji.git#refs/heads/main",
            "--destination=lvtujingji/adp-dev"] # replace with your dockerhub account
    volumeMounts:
      - name: kaniko-secret
        mountPath: /kaniko/.docker
  restartPolicy: Never
  volumes:
    - name: kaniko-secret
      secret:
        secretName: regcred
        items:
          - key: .dockerconfigjson
            path: config.json
